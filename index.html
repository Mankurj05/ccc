<!DOCTYPE html>
<html>
<head>
    <title>Table and Form Assignment</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>

    <h2>Student Information Table</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Branch</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Rahul</td>
            <td>CSE</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Priya</td>
            <td>ECE</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Amit</td>
            <td>MECH</td>
        </tr>
    </table>

    <h2>Student Registration Form</h2>

    <form>
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Branch:</label>
        <select>
            <option>CSE</option>
            <option>ECE</option>
            <option>MECH</option>
            <option>CIVIL</option>
        </select>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
